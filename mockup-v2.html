<style>
  @font-face {
    font-family: "Freshman";
    src: url("assets/fonts/Freshman.ttf") format("truetype");
    font-display: swap;
  }
  @font-face {
    font-family: "Varsity";
    src: url("assets/fonts/varsity_regular.ttf") format("truetype");
    font-display: swap;
  }

  :root {
    --azul: #0b23c9;
    --azul-escuro: #071694;
    --azul-dot: #0517a3;
    --verde: #0f9d3a;
    --verde-escuro: #0a6423;
    --amarelo: #ffd400;
    --creme: #f6f1e3;
    --creme-fundo: #efe8d3;
    --papel-linha: #e3d9bd;
    --preto: #101010;
    --branco: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--preto);
    background:
      radial-gradient(var(--papel-linha) 1.3px, transparent 1.3px),
      var(--creme);
    background-size: 22px 22px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* estrelinhas de confete espalhadas no papel */
  .confete {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 540px;
    margin: 0 auto;
    padding: 0 20px 56px;
  }

  /* ── BARRA SUPERIOR (placar) ── */
  .placar {
    position: relative;
    z-index: 1;
    background:
      radial-gradient(var(--azul-dot) 1.5px, transparent 1.5px),
      linear-gradient(120deg, #1436e6, var(--azul-escuro));
    background-size: 13px 13px, cover;
    border-bottom: 4px solid var(--amarelo);
    color: var(--branco);
  }
  .placar-inner {
    max-width: 540px;
    margin: 0 auto;
    padding: 12px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .placar .marca {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "Freshman", sans-serif;
    font-size: 17px;
    letter-spacing: .1em;
  }
  .placar .marca svg { width: 13px; height: 13px; fill: var(--amarelo); }
  .placar .dia {
    font-family: "Varsity", sans-serif;
    font-size: 13px;
    letter-spacing: .1em;
    background: var(--amarelo);
    color: var(--preto);
    border: 2px solid var(--preto);
    border-radius: 999px;
    padding: 4px 12px 3px;
  }

  /* ── HERO: quadro azul colado no papel ── */
  .quadro {
    position: relative;
    margin-top: 34px;
    padding: 38px 22px 34px;
    background:
      radial-gradient(var(--azul-dot) 1.6px, transparent 1.6px),
      linear-gradient(150deg, #1436e6 0%, var(--azul) 55%, var(--azul-escuro) 100%);
    background-size: 14px 14px, cover;
    border: 3px solid var(--preto);
    border-radius: 20px;
    box-shadow: 7px 7px 0 rgba(16, 16, 16, .25);
    transform: rotate(-1.1deg);
    text-align: center;
    overflow: hidden;
  }
  .quadro .verde-wedge {
    position: absolute;
    inset: 0;
    background: linear-gradient(140deg, #23b552, var(--verde) 55%, var(--verde-escuro));
    clip-path: polygon(0 0, 62% 0, 0 88%);
    pointer-events: none;
  }
  .quadro .estrela-canto {
    position: absolute;
    fill: var(--amarelo);
    opacity: .95;
  }
  .quadro img.logo {
    position: relative;
    width: min(100%, 430px);
    height: auto;
    filter: drop-shadow(0 4px 0 rgba(0, 0, 0, .25));
  }
  .quadro .igreja {
    position: relative;
    margin-top: 18px;
    color: var(--branco);
    line-height: 1.15;
  }
  .quadro .igreja small {
    display: block;
    font-size: 9.5px;
    letter-spacing: .3em;
    font-weight: 600;
    text-transform: uppercase;
    opacity: .92;
  }
  .quadro .igreja strong {
    display: block;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 17px;
    letter-spacing: .16em;
    font-weight: 600;
    text-transform: uppercase;
  }

  /* fita adesiva */
  .fita {
    position: absolute;
    width: 92px;
    height: 26px;
    background: rgba(255, 212, 0, .55);
    border: 1px solid rgba(16, 16, 16, .18);
    box-shadow: 0 1px 3px rgba(16, 16, 16, .12);
    z-index: 3;
  }

  .chip-linha { text-align: center; margin-top: 26px; }
  .chip {
    display: inline-block;
    background: var(--amarelo);
    color: var(--preto);
    font-family: "Varsity", sans-serif;
    font-size: 17px;
    letter-spacing: .12em;
    padding: 8px 22px 6px;
    border: 3px solid var(--preto);
    border-radius: 999px;
    box-shadow: 4px 4px 0 rgba(16, 16, 16, .22);
    transform: rotate(1.6deg);
  }

  /* ── TÍTULOS DE SEÇÃO (v2: Varsity azul sobre o papel) ── */
  .secao { margin-top: 54px; }
  .secao-titulo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    font-family: "Varsity", sans-serif;
    font-weight: 400;
    font-size: clamp(24px, 6vw, 30px);
    letter-spacing: .1em;
    color: var(--azul);
  }
  .secao-titulo svg { width: 16px; height: 16px; fill: var(--verde); flex: none; }
  .secao-sub {
    margin-top: 8px;
    text-align: center;
    font-size: 14px;
    line-height: 1.5;
    color: #4a4436;
  }

  /* ── PRELETORES: fotos coladas no álbum ── */
  .foto-album {
    position: relative;
    display: block;
    margin-top: 26px;
    padding: 10px 10px 12px;
    background: var(--branco);
    border: 1px solid #d8d0ba;
    box-shadow: 0 4px 14px rgba(16, 16, 16, .16), 3px 3px 0 rgba(16, 16, 16, .08);
  }
  .foto-album:nth-child(odd)  { transform: rotate(-1.4deg); }
  .foto-album:nth-child(even) { transform: rotate(1.1deg); }
  .foto-album img {
    display: block;
    width: 100%;
    height: auto;
  }
  .foto-album figcaption {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding-top: 10px;
    font-family: "Varsity", sans-serif;
    font-size: 16px;
    letter-spacing: .14em;
    color: var(--verde-escuro);
    text-transform: uppercase;
  }
  .foto-album figcaption svg { width: 11px; height: 11px; fill: var(--amarelo); stroke: var(--preto); stroke-width: 1; flex: none; }

  /* ── GALERIA: carrossel de polaroids ── */
  .carrossel { position: relative; margin-top: 10px; }
  .trilho {
    display: flex;
    gap: 18px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 20px 6px 22px;
    scrollbar-width: none;
  }
  .trilho::-webkit-scrollbar { display: none; }
  .polaroid {
    flex: 0 0 76%;
    max-width: 330px;
    scroll-snap-align: center;
    position: relative;
    background: var(--branco);
    border: 1px solid #d8d0ba;
    padding: 9px 9px 12px;
    box-shadow: 0 4px 14px rgba(16, 16, 16, .16), 3px 3px 0 rgba(16, 16, 16, .08);
  }
  .polaroid:nth-child(odd)  { transform: rotate(-1.6deg); }
  .polaroid:nth-child(even) { transform: rotate(1.3deg); }
  .polaroid img {
    display: block;
    width: 100%;
    aspect-ratio: 4 / 5;
    object-fit: cover;
  }
  .polaroid .fita { width: 74px; height: 22px; top: -11px; left: 50%; margin-left: -37px; }
  .polaroid .num-foto {
    position: absolute;
    right: -7px;
    bottom: -8px;
    font-family: "Freshman", sans-serif;
    font-size: 10px;
    background: var(--amarelo);
    border: 2px solid var(--preto);
    border-radius: 7px;
    padding: 3px 6px 2px;
    letter-spacing: .06em;
  }
  .seta-carrossel {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    width: 40px;
    height: 40px;
    display: grid;
    place-items: center;
    background: var(--amarelo);
    border: 3px solid var(--preto);
    border-radius: 50%;
    box-shadow: 3px 3px 0 rgba(16, 16, 16, .22);
    cursor: pointer;
    font-family: sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--preto);
    transition: transform .12s ease;
  }
  .seta-carrossel:hover { transform: translateY(-50%) scale(1.08); }
  .seta-carrossel:active { transform: translateY(-50%) scale(.94); }
  .seta-carrossel.esq { left: -8px; }
  .seta-carrossel.dir { right: -8px; }
  .arrasta {
    text-align: center;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #857a5c;
    margin-top: -6px;
  }

  /* ── LINKS: ingressos picotados ── */
  .ingressos { margin-top: 24px; display: grid; gap: 16px; }
  .ingresso {
    position: relative;
    display: flex;
    align-items: stretch;
    text-decoration: none;
    border: 3px solid var(--preto);
    border-radius: 14px;
    box-shadow: 5px 5px 0 rgba(16, 16, 16, .22);
    transition: transform .12s ease, box-shadow .12s ease;
    overflow: visible;
  }
  .ingresso:hover { transform: translate(-2px, -2px) rotate(-.4deg); box-shadow: 8px 8px 0 rgba(16, 16, 16, .22); }
  .ingresso:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 rgba(16, 16, 16, .22); }
  .ingresso .corpo {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    padding: 13px 16px 11px;
    border-radius: 11px 0 0 11px;
    color: var(--branco);
  }
  .ingresso .corpo .mini {
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: .28em;
    text-transform: uppercase;
    opacity: .85;
  }
  .ingresso .corpo .rotulo {
    font-family: "Varsity", sans-serif;
    font-size: 21px;
    letter-spacing: .08em;
  }
  .ingresso .talao {
    flex: none;
    width: 58px;
    display: grid;
    place-items: center;
    background: var(--amarelo);
    border-left: 3px dashed rgba(16, 16, 16, .55);
    border-radius: 0 11px 11px 0;
    color: var(--preto);
    font-weight: 800;
    font-size: 20px;
    font-family: sans-serif;
  }
  .ingresso.verde .corpo { background: linear-gradient(120deg, #16ad45, var(--verde-escuro)); }
  .ingresso.azul  .corpo { background: linear-gradient(120deg, #1436e6, var(--azul-escuro)); }

  /* furos do picote */
  .ingresso .furo {
    position: absolute;
    right: 51.5px;
    width: 13px;
    height: 13px;
    background: var(--creme);
    border: 3px solid var(--preto);
    border-radius: 50%;
    z-index: 2;
  }
  .ingresso .furo.cima  { top: -10px; }
  .ingresso .furo.baixo { bottom: -10px; }

  .ingresso.off,
  .ingresso.off:hover,
  .ingresso.off:active {
    opacity: .55;
    filter: saturate(.3);
    cursor: not-allowed;
    transform: none;
    box-shadow: 2px 2px 0 rgba(16, 16, 16, .22);
  }
  .ingresso.off .talao { font-size: 8px; letter-spacing: .05em; text-align: center; line-height: 1.4; font-weight: 800; padding: 4px; }

  /* ── STICKERS: álbum de figurinhas ── */
  .album-grid {
    margin-top: 24px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .slot {
    position: relative;
    display: grid;
    place-items: center;
    aspect-ratio: 1;
    padding: 12px;
    background: var(--creme-fundo);
    border: 2.5px dashed #b7ab88;
    border-radius: 12px;
    transition: transform .12s ease;
  }
  .slot:hover { transform: scale(1.04) rotate(-1.2deg); }
  .slot:active { transform: scale(.97); }
  .slot img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transform: rotate(var(--gira, -2deg));
    filter: drop-shadow(0 3px 4px rgba(16, 16, 16, .22));
  }
  .slot:nth-child(3n)   { --gira: 2.4deg; }
  .slot:nth-child(3n+2) { --gira: -1.2deg; }
  .slot .num {
    position: absolute;
    top: -8px;
    left: -6px;
    font-family: "Freshman", sans-serif;
    font-size: 10px;
    background: var(--amarelo);
    border: 2px solid var(--preto);
    border-radius: 7px;
    padding: 3px 6px 2px;
    letter-spacing: .06em;
    z-index: 2;
  }
  .slot .baixar {
    position: absolute;
    right: -6px;
    bottom: -6px;
    width: 24px;
    height: 24px;
    display: grid;
    place-items: center;
    background: var(--verde);
    border: 2px solid var(--preto);
    border-radius: 8px;
    z-index: 2;
  }
  .slot .baixar svg { width: 12px; height: 12px; fill: var(--branco); }

  .ingresso-zip { margin-top: 26px; }
  .ingresso-zip .corpo { background: linear-gradient(120deg, var(--amarelo), #e8b800); }
  .ingresso-zip .corpo .rotulo, .ingresso-zip .corpo .mini { color: var(--preto); }
  .ingresso-zip .talao { background: var(--azul); color: var(--branco); }

  /* ── RODAPÉ ── */
  footer {
    position: relative;
    z-index: 1;
    margin-top: 64px;
    background:
      radial-gradient(var(--azul-dot) 1.5px, transparent 1.5px),
      linear-gradient(120deg, #1436e6, var(--azul-escuro));
    background-size: 13px 13px, cover;
    border-top: 4px solid var(--amarelo);
    color: var(--branco);
    text-align: center;
    padding: 26px 20px 30px;
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    line-height: 2.1;
  }
  footer .brasil {
    font-family: "Freshman", sans-serif;
    font-size: 15px;
    letter-spacing: .12em;
  }

  /* selo de mockup */
  .selo-mockup {
    position: fixed;
    right: 12px;
    bottom: 12px;
    z-index: 9;
    background: var(--preto);
    color: var(--amarelo);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .18em;
    padding: 6px 12px;
    border-radius: 999px;
    border: 2px solid var(--amarelo);
    transform: rotate(-2deg);
    opacity: .92;
    pointer-events: none;
  }

  @media (max-width: 380px) {
    .album-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- confete de estrelinhas no papel -->
<svg class="confete" viewBox="0 0 400 860" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <path id="star5" d="M12 0 L15.2 8.2 L24 8.8 L17.2 14.5 L19.4 23 L12 18.3 L4.6 23 L6.8 14.5 L0 8.8 L8.8 8.2 Z"/>
  </defs>
  <g opacity=".16">
    <use href="#star5" fill="#0f9d3a" transform="translate(30,180) scale(1.1) rotate(-12 12 12)"/>
    <use href="#star5" fill="#0b23c9" transform="translate(360,240) scale(.9) rotate(20 12 12)"/>
    <use href="#star5" fill="#e8b800" transform="translate(350,540) scale(1.3) rotate(8 12 12)"/>
    <use href="#star5" fill="#0f9d3a" transform="translate(20,660) scale(.8) rotate(30 12 12)"/>
    <use href="#star5" fill="#0b23c9" transform="translate(60,420) scale(.7) rotate(-25 12 12)"/>
  </g>
</svg>

<!-- barra superior estilo placar -->
<div class="placar">
  <div class="placar-inner">
    <span class="marca">RESET <svg viewBox="0 0 24 24"><path d="M12 .6 15.2 8.4 23.6 9 17.2 14.5 19.2 22.7 12 18.3 4.8 22.7 6.8 14.5 .4 9 8.8 8.4Z"/></svg> 2026</span>
    <span class="dia" id="dia-chip"></span>
  </div>
</div>

<div class="wrap">

  <!-- HERO: quadro colado com fita -->
  <header>
    <div class="quadro">
      <div class="verde-wedge"></div>
      <svg class="estrela-canto" style="width:46px;top:-14px;right:-12px;transform:rotate(18deg)" viewBox="0 0 24 24"><path d="M12 .6 15.2 8.4 23.6 9 17.2 14.5 19.2 22.7 12 18.3 4.8 22.7 6.8 14.5 .4 9 8.8 8.4Z"/></svg>
      <svg class="estrela-canto" style="width:30px;bottom:10px;left:8px;transform:rotate(-14deg)" viewBox="0 0 24 24"><path d="M12 .6 15.2 8.4 23.6 9 17.2 14.5 19.2 22.7 12 18.3 4.8 22.7 6.8 14.5 .4 9 8.8 8.4Z"/></svg>
      <img class="logo" src="assets/img/logo-resetbrasil26.png" alt="RESET 2026 BRASIL">
      <div class="igreja">
        <small>Igreja Batista Nacional</small>
        <strong>Candeias</strong>
      </div>
      <span class="fita" style="top:-12px;left:-18px;transform:rotate(-38deg)"></span>
      <span class="fita" style="top:-12px;right:-18px;transform:rotate(38deg)"></span>
    </div>
    <div class="chip-linha"><span class="chip" id="chip"></span></div>
  </header>

  <!-- PRELETORES -->
  <section class="secao">
    <h2 class="secao-titulo" id="titulo-preletores"></h2>
    <div id="lista-preletores"></div>
  </section>

  <!-- GALERIA / CARROSSEL -->
  <section class="secao">
    <h2 class="secao-titulo" id="titulo-galeria"></h2>
    <div class="carrossel">
      <button class="seta-carrossel esq" id="seta-esq" aria-label="Foto anterior">←</button>
      <div class="trilho" id="trilho-fotos"></div>
      <button class="seta-carrossel dir" id="seta-dir" aria-label="Próxima foto">→</button>
    </div>
    <p class="arrasta">← arrasta pro lado →</p>
    <nav class="ingressos" id="ver-todas"></nav>
  </section>

  <!-- LINKS / INGRESSOS -->
  <section class="secao">
    <h2 class="secao-titulo" id="titulo-links"></h2>
    <nav class="ingressos" id="lista-links"></nav>
  </section>

  <!-- STICKERS / ÁLBUM -->
  <section class="secao">
    <h2 class="secao-titulo" id="titulo-album"></h2>
    <p class="secao-sub">Toque na figurinha para baixar.<br>Poste nos stories e marque a gente! 💚💛💙</p>
    <div class="album-grid" id="lista-stickers"></div>
    <a class="ingresso ingresso-zip" id="botao-zip" download>
      <span class="corpo">
        <span class="mini">Coleção completa • 24 figurinhas</span>
        <span class="rotulo">BAIXAR O ÁLBUM (.ZIP)</span>
      </span>
      <span class="talao" aria-hidden="true">↓</span>
      <span class="furo cima" aria-hidden="true"></span>
      <span class="furo baixo" aria-hidden="true"></span>
    </a>
  </section>

</div>

<footer>
  <div>Igreja Batista Nacional Candeias</div>
  <div class="brasil">RESET 2026 • BRASIL</div>
</footer>

<div class="selo-mockup">MOCKUP • V2</div>

<script>
  const STAR = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .6 15.2 8.4 23.6 9 17.2 14.5 19.2 22.7 12 18.3 4.8 22.7 6.8 14.5 .4 9 8.8 8.4Z"/></svg>';
  const DOWN = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 2h2v11l4-4 1.6 1.5L12 17 5.4 10.5 7 9l4 4V2zM4 19h16v2H4z"/></svg>';

  document.getElementById("dia-chip").textContent = CONFIG.diaChip;
  document.getElementById("chip").textContent = CONFIG.chip;

  /* preletores como fotos de álbum */
  document.getElementById("titulo-preletores").innerHTML = STAR + " " + CONFIG.tituloPreletores + " " + STAR;
  document.getElementById("lista-preletores").innerHTML = CONFIG.preletores.map((p, i) => `
    <figure class="foto-album">
      <img src="${p.imagem}" alt="Banner do preletor ${p.nome}" loading="lazy">
      <figcaption>${STAR} ${p.nome} ${STAR}</figcaption>
      <span class="fita" style="top:-13px;${i % 2 ? "right" : "left"}:26px;transform:rotate(${i % 2 ? "" : "-"}42deg)"></span>
    </figure>`).join("");

  /* galeria: carrossel de polaroids */
  document.getElementById("titulo-galeria").innerHTML = STAR + " " + CONFIG.fotos.titulo + " " + STAR;
  const pad3 = n => String(n).padStart(2, "0");
  document.getElementById("trilho-fotos").innerHTML = CONFIG.fotos.imagens.map((src, i) => `
    <figure class="polaroid">
      <span class="fita" aria-hidden="true"></span>
      <img src="${src}" alt="Foto do Reset 2026 número ${i + 1}" loading="lazy">
      <span class="num-foto">FOTO ${pad3(i + 1)}</span>
    </figure>`).join("");
  document.getElementById("ver-todas").innerHTML = `
    <a class="ingresso azul" href="${CONFIG.fotos.verTodas}" target="_blank" rel="noopener">
      <span class="corpo">
        <span class="mini">Galeria completa • Todos os dias</span>
        <span class="rotulo">VER TODAS AS FOTOS</span>
      </span>
      <span class="talao" aria-hidden="true">→</span>
      <span class="furo cima" aria-hidden="true"></span>
      <span class="furo baixo" aria-hidden="true"></span>
    </a>`;
  const trilho = document.getElementById("trilho-fotos");
  const passo = () => (trilho.querySelector(".polaroid")?.offsetWidth || 280) + 18;
  document.getElementById("seta-esq").onclick = () => trilho.scrollBy({ left: -passo(), behavior: "smooth" });
  document.getElementById("seta-dir").onclick = () => trilho.scrollBy({ left: passo(), behavior: "smooth" });

  /* links como ingressos (cores alternadas verde/azul) */
  document.getElementById("titulo-links").innerHTML = STAR + " INGRESSOS " + STAR;
  document.getElementById("lista-links").innerHTML = CONFIG.links.map((l, i) => {
    const cor = i % 2 ? "azul" : "verde";
    const furos = '<span class="furo cima" aria-hidden="true"></span><span class="furo baixo" aria-hidden="true"></span>';
    const corpo = `
      <span class="corpo">
        <span class="mini">Reset 2026 • Entrada livre</span>
        <span class="rotulo">${l.rotulo}</span>
      </span>`;
    if (!l.url) return `
    <span class="ingresso ${cor} off" aria-disabled="true">
      ${corpo}
      <span class="talao">${l.aviso || "EM BREVE"}</span>
      ${furos}
    </span>`;
    return `
    <a class="ingresso ${cor}" href="${l.url}" target="_blank" rel="noopener">
      ${corpo}
      <span class="talao" aria-hidden="true">→</span>
      ${furos}
    </a>`;
  }).join("");

  /* stickers como figurinhas numeradas */
  document.getElementById("titulo-album").innerHTML = STAR + " ÁLBUM DE FIGURINHAS " + STAR;
  const pad = n => String(n).padStart(2, "0");
  document.getElementById("lista-stickers").innerHTML =
    Array.from({ length: CONFIG.qtdStickers }, (_, i) => {
      const n = pad(i + 1);
      return `
      <a class="slot" href="assets/stickers/sticker-${n}.png" download="RESET26-sticker-${n}.png"
         title="Baixar figurinha ${n}">
        <span class="num">N.${n}</span>
        <img src="assets/stickers/sticker-${n}.png" alt="Sticker Reset 2026 número ${n}" loading="lazy">
        <span class="baixar" aria-hidden="true">${DOWN}</span>
      </a>`;
    }).join("");

  document.getElementById("botao-zip").href = CONFIG.zipStickers;
</script>

</body>
</html>
